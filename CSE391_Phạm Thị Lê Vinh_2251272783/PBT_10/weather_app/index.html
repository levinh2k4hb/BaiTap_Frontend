<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Nhập tên thành phố..." required>
            <button type="submit">Tìm</button>
        </form>

        <div id="displayArea"></div>
        <div id="historyArea">
            <h3>Lịch sử:</h3>
            <ul id="historyList"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
