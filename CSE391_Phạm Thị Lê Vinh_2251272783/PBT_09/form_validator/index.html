<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Đăng ký tài khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Họ và Tên</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Nhập tên của bạn">
                    <span class="icon" id="nameIcon"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <div class="error" id="emailError">Email không đúng định dạng.</div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-meter">
                    <div class="progress-bar" id="passProgress"></div>
                </div>
                <div class="strength-text" id="passText"></div>
            </div>

            <div class="form-group">
                <label for="confirmPass">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu">
                <div class="error" id="confirmError">Mật khẩu không khớp.</div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="0901-234-567">
                <div class="error" id="phoneError">Vui lòng nhập đủ 10 số.</div>
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng ký</button>
        </form>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>🎉 Đăng ký thành công!</h3>
            <div id="modalInfo"></div>
            <button id="closeModalBtn">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
